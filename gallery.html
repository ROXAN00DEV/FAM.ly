<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fam.ly — Gallery</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animations.css">
<style>
.albums-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: .9rem;
  padding: 0 1.1rem;
}
.alb-card {
  border-radius: var(--r20);
  overflow: hidden;
  cursor: pointer;
  transition: transform .3s var(--spring), box-shadow .3s;
}
.alb-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(0,0,0,.4);
}
.alb-cover {
  aspect-ratio: 1;
  background: var(--bg3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
  position: relative;
}
.alb-ov {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,.75));
}
.alb-txt {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: .8rem;
}
.alb-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  font-weight: 500;
  color: white;
  line-height: 1.2;
}
.alb-count {
  font-size: .65rem;
  color: rgba(255,255,255,.65);
  margin-top: 2px;
}
.filter-row {
  display: flex;
  gap: .5rem;
  padding: .5rem 1.1rem 1rem;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar {
  display: none;
}
.fpill {
  padding: .3rem .85rem;
  border-radius: var(--rf);
  font-size: .75rem;
  font-weight: 600;
  background: var(--gl2);
  border: 1px solid var(--br);
  color: var(--tx2);
  white-space: nowrap;
  transition: all .2s;
  flex-shrink: 0;
}
.fpill.on, .fpill:hover {
  background: var(--gd);
  border-color: var(--br2);
  color: var(--gold);
}

/* 🌟 ALBUM DETAIL MODAL STYLING */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(8, 6, 8, 0.85);
  backdrop-filter: blur(20px);
  z-index: 150;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s var(--ease);
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}
.modal-card {
  width: 100%;
  max-width: 600px;
  max-height: 85vh;
  border-radius: var(--r28) var(--r28) 0 0;
  background: var(--bg2);
  border: 1px solid var(--br);
  border-bottom: none;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform .4s var(--spring);
}
.modal-overlay.open .modal-card {
  transform: translateY(0);
}
@media (min-width: 640px) {
  .modal-overlay {
    align-items: center;
    padding: 2rem;
  }
  .modal-card {
    border-radius: var(--r28);
    border-bottom: 1px solid var(--br);
    max-height: 80vh;
    transform: scale(0.9) translateY(20px);
    transition: transform .3s var(--spring);
  }
  .modal-overlay.open .modal-card {
    transform: scale(1) translateY(0);
  }
}
.modal-header {
  padding: 1.5rem 1.5rem 1rem;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  border-bottom: 1px solid var(--br);
}
.modal-title-wrap {
  flex: 1;
  padding-right: 1rem;
}
.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem;
  font-weight: 400;
  color: var(--gold);
  line-height: 1.2;
}
.modal-desc {
  font-size: .8rem;
  color: var(--tx2);
  margin-top: 4px;
  line-height: 1.4;
}
.modal-close {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--gl2);
  border: 1px solid var(--br);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .85rem;
  transition: all .2s;
}
.modal-close:hover {
  border-color: var(--br2);
  transform: scale(1.05);
}
.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 1.2rem;
  scrollbar-width: none;
}
.modal-body::-webkit-scrollbar {
  display: none;
}
.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: .6rem;
}
.photo-item {
  aspect-ratio: 1;
  border-radius: var(--r14);
  overflow: hidden;
  border: 1px solid var(--br);
  cursor: pointer;
  transition: transform .25s var(--ease), border-color .25s;
}
.photo-item:hover {
  transform: scale(1.03);
  border-color: var(--br2);
}
.photo-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.modal-footer {
  padding: 1rem 1.5rem 1.5rem;
  display: flex;
  justify-content: center;
  border-top: 1px solid var(--br);
}
.btn-danger {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  padding: .6rem 1.4rem;
  background: rgba(224, 92, 92, 0.12);
  border: 1.5px solid rgba(224, 92, 92, 0.35);
  color: var(--red);
  font-weight: 600;
  font-size: .8rem;
  border-radius: var(--rf);
  transition: all .2s;
}
.btn-danger:hover {
  background: var(--red);
  color: white;
  border-color: var(--red);
  transform: translateY(-1px);
}
.preview-play-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.3);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .8rem;
  pointer-events: none;
  z-index: 2;
}
</style>
</head>
<body>
<div id="particles"></div>
<div class="amb"></div>
<div class="content page-in">

  <div class="topbar">
    <div class="tb-logo">Fam<em>.</em>ly</div>
    <div class="tb-right">
      <div class="tb-icon" onclick="toggleTheme()" id="themeIc">🌙</div>
      <div class="tb-av"><img src="https://i.pravatar.cc/100?img=12" alt="you"></div>
    </div>
  </div>

  <div class="page-header">
    <div>
      <div class="page-title">Gallery</div>
      <div class="page-sub">All your family albums</div>
    </div>
    <a href="create-album.html" class="btn-outline">+ Album</a>
  </div>

  <div class="filter-row">
    <div class="fpill on">All</div>
    <div class="fpill">Trips</div>
    <div class="fpill">Birthdays</div>
    <div class="fpill">Festivals</div>
    <div class="fpill">Childhood</div>
    <div class="fpill">Milestones</div>
  </div>

  <div class="albums-grid" id="albumsGrid"></div>

</div>

<!-- ALBUM DETAIL VIEW MODAL -->
<div class="modal-overlay" id="albumModal" onclick="closeAlbumModal(event)">
  <div class="modal-card glass-card" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title-wrap">
        <h2 class="modal-title" id="mTitle">Album Title</h2>
        <p class="modal-desc" id="mDesc">Album Description</p>
      </div>
      <button class="modal-close" onclick="hideAlbumModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="photo-grid" id="mPhotoGrid"></div>
      <div class="empty-state" id="mEmptyState" style="display:none">
        <div class="em-icon">📸</div>
        <div class="em-title">No photos yet</div>
        <div class="em-sub">Add photos to this album!</div>
      </div>
    </div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<div class="toasts" id="toasts"></div>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
let allAlbumsGlobal = [];

document.addEventListener('DOMContentLoaded', () => {
  renderAlbums();

  document.querySelectorAll('.fpill').forEach(p => {
    p.onclick = () => {
      document.querySelectorAll('.fpill').forEach(x => x.classList.remove('on'));
      p.classList.add('on');
      toast('Filtering: ' + p.textContent);
      filterAlbums(p.textContent);
    };
  });
});

function renderAlbums() {
  const customAlbums = JSON.parse(localStorage.getItem('familyAlbums')) || [];
  const deletedIds = JSON.parse(localStorage.getItem('deletedAlbumIds')) || [];
  
  const defaultAlbumsWithId = ALBUMS.map((a, idx) => ({
    id: `default_${idx}`,
    ...a
  }));
  
  const filteredDefaultAlbums = defaultAlbumsWithId.filter(def => {
    if (deletedIds.includes(def.id)) return false;
    if (customAlbums.some(c => String(c.id) === String(def.id))) return false;
    return true;
  });
  
  allAlbumsGlobal = [...customAlbums, ...filteredDefaultAlbums];
  displayAlbums(allAlbumsGlobal);
}

function displayAlbums(list) {
  const grid = document.getElementById('albumsGrid');
  if (list.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1">
        <div class="em-icon">📸</div>
        <div class="em-title">No albums yet</div>
        <div class="em-sub">Create your first album by clicking "+ Album"</div>
      </div>
    `;
    return;
  }
  
  grid.innerHTML = list.map((a, i) => {
    const hasCover = a.images && a.images.length > 0;
    const coverUrl = hasCover ? a.images[0] : '';
    
    // Find matching index in the global list for the modal lookup
    const globalIndex = allAlbumsGlobal.indexOf(a);
    
    const isVideoCover = coverUrl.startsWith('data:video/') || coverUrl.toLowerCase().endsWith('.mp4') || coverUrl.toLowerCase().endsWith('.webm') || coverUrl.toLowerCase().endsWith('.mov');
    
    let coverStyle = '';
    let coverHtml = '';
    
    if (hasCover) {
      if (isVideoCover) {
        coverHtml = `<video src="${coverUrl}" muted autoplay loop playsinline style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0;"></video>`;
      } else {
        coverStyle = `background-image: url(${coverUrl}); background-size: cover; background-position: center;`;
      }
    }
    
    return `
      <div class="glass-card alb-card rv" style="animation-delay:${i * .06}s" onclick="viewAlbumDetails(${globalIndex})">
        <div class="alb-cover" style="${coverStyle}">
          ${coverHtml}
          ${hasCover ? '' : `<span>${a.emoji || '🖼️'}</span>`}
          <div class="alb-ov" style="z-index:1;"></div>
          <div class="alb-txt" style="z-index:2;">
            <div class="alb-name">${a.emoji || '🖼️'} ${a.name}</div>
            <div class="alb-count">${a.count} items</div>
          </div>
        </div>
        <div style="padding:.7rem .9rem">
          <div style="font-size:.78rem;font-weight:600">${a.name}</div>
          <div style="font-size:.68rem;color:var(--tx3);margin-top:2px">${a.desc}</div>
        </div>
      </div>
    `;
  }).join('');
  
  setupScrollReveal();
}

function filterAlbums(tag) {
  if (tag === 'All') {
    displayAlbums(allAlbumsGlobal);
    return;
  }
  
  // Categorize default and custom albums based on description or manual mapping
  const filtered = allAlbumsGlobal.filter(a => {
    const name = a.name.toLowerCase();
    const desc = a.desc.toLowerCase();
    const t = tag.toLowerCase();
    
    if (t === 'trips' && (name.includes('trip') || desc.includes('trip') || name.includes('goa') || name.includes('shimla'))) return true;
    if (t === 'birthdays' && (name.includes('bday') || name.includes('birthday') || name.includes('70th') || desc.includes('birthday'))) return true;
    if (t === 'festivals' && (name.includes('puja') || name.includes('festival') || desc.includes('diwali') || desc.includes('eid') || desc.includes('holi'))) return true;
    if (t === 'childhood' && (name.includes('childhood') || desc.includes('scanned') || desc.includes('child'))) return true;
    if (t === 'milestones' && (name.includes('journey') || desc.includes('engineer') || desc.includes('promotion') || desc.includes('grad'))) return true;
    
    return false;
  });
  
  displayAlbums(filtered);
}

function viewAlbumDetails(idx) {
  const album = allAlbumsGlobal[idx];
  if (!album) return;
  
  document.getElementById('mTitle').innerText = (album.emoji ? album.emoji + ' ' : '') + album.name;
  document.getElementById('mDesc').innerText = album.desc || '';
  
  const mPhotoGrid = document.getElementById('mPhotoGrid');
  const mEmptyState = document.getElementById('mEmptyState');
  const modalFooter = document.getElementById('modalFooter');
  
  mPhotoGrid.innerHTML = '';
  modalFooter.innerHTML = '';
  
  if (album.images && album.images.length > 0) {
    mEmptyState.style.display = 'none';
    album.images.forEach(imgSrc => {
      const item = document.createElement('div');
      item.className = 'photo-item';
      item.style.position = 'relative';
      item.onclick = (e) => {
        e.stopPropagation(); // prevent modal close
        openLbx(imgSrc);
      };
      
      const isVideo = imgSrc.startsWith('data:video/') || imgSrc.toLowerCase().endsWith('.mp4') || imgSrc.toLowerCase().endsWith('.webm') || imgSrc.toLowerCase().endsWith('.mov');
      if (isVideo) {
        item.innerHTML = `
          <video src="${imgSrc}" muted loop playsinline style="width:100%; height:100%; object-fit:cover;" onmouseenter="this.play()" onmouseleave="this.pause(); this.currentTime=0;"></video>
          <div class="preview-play-icon">▶</div>
        `;
      } else {
        item.innerHTML = `<img src="${imgSrc}" alt="photo" loading="lazy">`;
      }
      mPhotoGrid.appendChild(item);
    });
  } else {
    mEmptyState.style.display = 'block';
  }
  
  // Action buttons
  modalFooter.innerHTML = '';
  modalFooter.style.display = 'flex';
  modalFooter.style.gap = '.8rem';
  
  const editBtn = document.createElement('button');
  editBtn.className = 'btn-outline';
  editBtn.style.padding = '.6rem 1.4rem';
  editBtn.innerHTML = '✏️ Edit Album';
  editBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    e.preventDefault();
    hideAlbumModal();
    window.location.href = 'create-album.html?edit=' + album.id;
  });
  modalFooter.appendChild(editBtn);

  const delBtn = document.createElement('button');
  delBtn.className = 'btn-danger';
  delBtn.innerHTML = '🗑️ Delete Album';
  delBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    e.preventDefault();
    deleteAlbum(album.id);
  });
  modalFooter.appendChild(delBtn);
  
  document.getElementById('albumModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function hideAlbumModal() {
  document.getElementById('albumModal').classList.remove('open');
  document.body.style.overflow = '';
  // Pause any videos playing in the grid
  document.querySelectorAll('#mPhotoGrid video').forEach(v => v.pause());
}

function closeAlbumModal(e) {
  if (e.target === document.getElementById('albumModal')) {
    hideAlbumModal();
  }
}

function deleteAlbum(id) {
  const idStr = String(id);
  
  // Mark default albums as deleted
  if (idStr.startsWith('default_')) {
    const deletedIds = JSON.parse(localStorage.getItem('deletedAlbumIds')) || [];
    if (!deletedIds.includes(idStr)) {
      deletedIds.push(idStr);
      localStorage.setItem('deletedAlbumIds', JSON.stringify(deletedIds));
    }
  }
  
  // Always clean from custom albums (handles both custom and edited-default)
  let customAlbums = JSON.parse(localStorage.getItem('familyAlbums')) || [];
  customAlbums = customAlbums.filter(a => String(a.id) !== idStr);
  localStorage.setItem('familyAlbums', JSON.stringify(customAlbums));
  
  toast('🗑️ Album deleted');
  hideAlbumModal();
  
  // Small delay to let modal close animation finish before re-rendering
  setTimeout(() => {
    renderAlbums();
  }, 100);
}
</script>
</body>
</html>
